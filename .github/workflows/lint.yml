name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
    - name: Install dependencies
      run: npm install
    - name: Run ESLint
      run: npm run lint
